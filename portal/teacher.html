<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Games — Teacher</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #0f1729; color: #e8edf7; }
  header { background: #16213e; padding: 14px 22px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #26304d; }
  header h1 { font-size: 1.25rem; margin: 0; }
  header a { color: #9db4ff; text-decoration: none; margin-left: auto; font-size: .9rem; }
  .tabs { display: flex; gap: 4px; padding: 0 18px; background: #16213e; border-bottom: 1px solid #26304d; }
  .tab { padding: 12px 18px; cursor: pointer; border: none; background: none; color: #9aa7c7; font-size: .95rem; border-bottom: 3px solid transparent; }
  .tab.active { color: #fff; border-bottom-color: #4f7cff; }
  main { padding: 22px; max-width: 1100px; margin: 0 auto; }
  .panel { display: none; } .panel.active { display: block; }
  .card { background: #1a2340; border: 1px solid #28324f; border-radius: 12px; padding: 16px 18px; margin-bottom: 14px; }
  .card h3 { margin: 0 0 4px; font-size: 1.1rem; }
  .muted { color: #8b98ba; font-size: .85rem; }
  button.act { background: #4f7cff; color: #fff; border: none; border-radius: 8px; padding: 7px 13px; cursor: pointer; font-size: .85rem; }
  button.act.danger { background: #e2455a; } button.act.ghost { background: #2a3557; }
  button.act:hover { filter: brightness(1.1); }
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #28324f; }
  th { color: #8b98ba; font-weight: 600; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .chip { display: inline-block; padding: 3px 8px; border-radius: 6px; background: #2a3557; font-size: .8rem; cursor: pointer; user-select: none; }
  .chip.on { background: #4f7cff; color: #fff; }
  input, select { background: #0f1729; border: 1px solid #2a3557; color: #e8edf7; border-radius: 7px; padding: 6px 9px; font-size: .88rem; }
  #login { max-width: 340px; margin: 12vh auto; text-align: center; }
  #login input { width: 100%; margin: 12px 0; padding: 11px; }
  .err { color: #ff8095; font-size: .85rem; min-height: 1em; }
  details summary { cursor: pointer; color: #9db4ff; }
  .pill { font-size: .72rem; padding: 2px 7px; border-radius: 999px; background: #2a3557; }
  .pill.active { background: #2e7d5b; color: #d6ffe9; }
</style>
</head>
<body>
<div id="login">
  <h1>👩‍🏫 Teacher Dashboard</h1>
  <input type="password" id="pw" placeholder="Teacher password" onkeydown="if(event.key==='Enter')doLogin()">
  <button class="act" onclick="doLogin()">Enter</button>
  <div class="err" id="loginErr"></div>
</div>

<div id="app" style="display:none">
  <header>
    <h1>🎮 Family Games — Teacher</h1>
    <a href="/">← Game menu</a>
  </header>
  <div class="tabs">
    <button class="tab active" data-tab="players" onclick="showTab('players')">Players</button>
    <button class="tab" data-tab="words" onclick="showTab('words')">Word Lists</button>
    <button class="tab" data-tab="typing" onclick="showTab('typing')">Typing Train</button>
    <button class="tab" data-tab="skate" onclick="showTab('skate')">Skate 'n' Add</button>
    <button class="tab" data-tab="reading" onclick="showTab('reading')">Rocket Read</button>
    <button class="tab" data-tab="requests" onclick="showTab('requests')">Game Requests</button>
    <button class="tab" data-tab="sessions" onclick="showTab('sessions')">Spelling Sessions</button>
    <button class="tab" data-tab="live" onclick="showTab('live')">Live</button>
  </div>
  <main>
    <div class="panel active" id="panel-players"></div>
    <div class="panel" id="panel-words"></div>
    <div class="panel" id="panel-typing"></div>
    <div class="panel" id="panel-skate"></div>
    <div class="panel" id="panel-reading"></div>
    <div class="panel" id="panel-requests"></div>
    <div class="panel" id="panel-sessions"></div>
    <div class="panel" id="panel-live"></div>
  </main>
</div>

<script>
const OPS = ['addition','subtraction','multiplication','division'];
const OP_SYM = { addition:'+', subtraction:'−', multiplication:'×', division:'÷' };
let PW = '';

function api(pathname, opts = {}) {
  return fetch('/teacher/api' + pathname, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'x-teacher-password': PW, ...(opts.headers||{}) },
  }).then(async r => { if (!r.ok) throw new Error((await r.json().catch(()=>({}))).error || r.status); return r.json(); });
}

async function doLogin() {
  PW = document.getElementById('pw').value;
  try {
    await api('/verify');
    sessionStorage.setItem('tpw', PW);
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadPlayers();
  } catch (e) {
    document.getElementById('loginErr').textContent = 'Wrong password';
  }
}

function showTab(t) {
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.dataset.tab === t));
  document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
  document.getElementById('panel-' + t).classList.add('active');
  ({ players: loadPlayers, words: loadWords, typing: loadTyping, skate: loadSkate, reading: loadReading, requests: loadRequests, sessions: loadSessions, live: loadLive }[t])();
}

// ─── Rocket Read ─────────────────────────────────────────────────────────────
async function loadReading() {
  const el = document.getElementById('panel-reading');
  el.innerHTML = '<p class="muted">Loading…</p>';
  const rows = await api('/reading');
  if (!rows.length) { el.innerHTML = '<p class="muted">No one has played Rocket Read yet.</p>'; return; }
  el.innerHTML = '<div class="card"><h3>Rocket Read — reading comprehension</h3><table><tr><th>Player</th><th>Right</th><th>Wrong</th><th>Accuracy</th><th>Best streak</th></tr>' +
    rows.map(r => { const tot = r.correct + r.incorrect, acc = tot ? Math.round(r.correct/tot*100) : 0;
      return `<tr><td>${esc(r.username)}</td><td>${r.correct}</td><td>${r.incorrect}</td><td>${acc}%</td><td>${r.best_streak}</td></tr>`; }).join('') +
    '</table></div>';
}

// ─── Skate 'n' Add ───────────────────────────────────────────────────────────
async function loadSkate() {
  const el = document.getElementById('panel-skate');
  el.innerHTML = '<p class="muted">Loading…</p>';
  const rows = await api('/skate');
  if (!rows.length) { el.innerHTML = '<p class="muted">No one has played Skate \'n\' Add yet.</p>'; return; }
  el.innerHTML = '<div class="card"><h3>Skate \'n\' Add — addition practice</h3>' +
    rows.map(r => {
      const tot = r.correct + r.incorrect, acc = tot ? Math.round(r.correct / tot * 100) : 0;
      return `<details style="border-bottom:1px solid #28324f;padding:6px 0" data-pid="${r.player_id}" ontoggle="if(this.open)loadSkateFacts(${r.player_id},this)">
        <summary><b>${esc(r.username)}</b> <span class="muted">— ${r.correct}✓ / ${r.incorrect}✗ · ${acc}% · best streak ${r.best_streak}</span></summary>
        <div class="sfacts muted" style="margin:8px 0 4px">Loading…</div>
      </details>`;
    }).join('') + '</div>';
}
async function loadSkateFacts(pid, node) {
  const box = node.querySelector('.sfacts');
  const facts = await api(`/skate/${pid}/facts`);
  const weak = facts.map(f => ({ f: `${f.a}+${f.b}`, tot: f.correct + f.incorrect, acc: (f.correct + f.incorrect) ? f.correct / (f.correct + f.incorrect) : 1 }))
    .filter(x => x.tot >= 2).sort((a, b) => a.acc - b.acc).slice(0, 8).filter(x => x.acc < 1);
  box.classList.remove('muted');
  box.innerHTML = weak.length
    ? 'Trickiest facts: ' + weak.map(x => `<span class="chip">${x.f} (${Math.round(x.acc*100)}%)</span>`).join(' ')
    : '<span class="muted">no tricky facts yet — all solid 👍</span>';
}

// ─── Game Requests (from the kids' Game Wizard) ──────────────────────────────
async function loadRequests() {
  const el = document.getElementById('panel-requests');
  el.innerHTML = '<p class="muted">Loading…</p>';
  const ai = await api('/ai-key');
  const keyCard = `<div class="card">
    <h3>🤖 AI Helper (Game Wizard)</h3>
    <div class="muted">The Game Wizard needs an Anthropic API key to chat with kids.
      Status: ${ai.set ? `<b style="color:#7fe3a0">on</b> ${ai.source==='env'?'(set in server environment)':'(saved here)'}` : '<b style="color:#ff9db0">off</b>'}.</div>
    ${ai.editable ? `<div class="row" style="margin-top:10px">
        <input id="aiKey" type="password" placeholder="Paste Anthropic API key (sk-ant-…)" style="flex:1">
        <button class="act" onclick="saveKey()">Save &amp; test</button>
        ${ai.set ? '<button class="act ghost" onclick="clearKey()">Turn off</button>' : ''}
      </div>
      <div class="muted" id="aiKeyMsg" style="margin-top:6px"></div>
      <div class="muted" style="margin-top:4px">Stored in this server's database. Get a key at console.anthropic.com and add API credits.</div>`
      : '<div class="muted" style="margin-top:6px">Set via the server environment — change it there.</div>'}
  </div>`;
  const reqs = await api('/game-requests');
  if (!reqs.length) { el.innerHTML = keyCard + '<p class="muted">No game ideas submitted yet. Kids can make one at <b>/wizard</b>.</p>'; return; }
  const STATUSES = ['submitted','approved','building','done','rejected'];
  el.innerHTML = keyCard + reqs.map(r => `<div class="card">
      <div class="row">
        <h3 style="margin:0">${esc(r.title)}</h3>
        <span class="pill ${r.status==='approved'||r.status==='done'?'active':''}">${r.status}</span>
        <span class="muted">by ${esc(r.username||r.requester||'?')} · ${r.subject?esc(r.subject)+' · ':''}${fmt(r.created_at)}</span>
        <div style="margin-left:auto" class="row">
          <select onchange="setReqStatus(${r.id}, this.value)">
            ${STATUSES.map(s=>`<option value="${s}" ${s===r.status?'selected':''}>${s}</option>`).join('')}
          </select>
          <button class="act danger" onclick="delReq(${r.id},'${esc(r.title)}')">Delete</button>
        </div>
      </div>
      <details style="margin-top:8px"><summary>View the full idea</summary>
        <pre style="white-space:pre-wrap;background:#0f1729;border:1px solid #28324f;border-radius:8px;padding:12px;margin-top:8px;font-size:.85rem">${esc(r.requirements)}</pre>
      </details>
    </div>`).join('');
}
async function saveKey() {
  const key = document.getElementById('aiKey').value.trim();
  if (!key) return;
  const msg = document.getElementById('aiKeyMsg'); msg.textContent = 'Testing the key…';
  try { await api('/ai-key', { method:'POST', body: JSON.stringify({ key }) }); toast('AI helper switched on'); loadRequests(); }
  catch (e) { msg.textContent = '⚠️ ' + e.message; }
}
async function clearKey() { if (!confirm('Turn off the AI helper?')) return; await api('/ai-key', { method:'DELETE' }); loadRequests(); }
async function setReqStatus(id, status) { await api(`/game-requests/${id}/status`, { method:'POST', body: JSON.stringify({ status }) }); toast('Updated'); }
async function delReq(id, title) { if (!confirm(`Delete the idea "${title}"?`)) return; await api(`/game-requests/${id}`, { method:'DELETE' }); loadRequests(); }

// ─── Typing Train ────────────────────────────────────────────────────────────
async function loadTyping() {
  const el = document.getElementById('panel-typing');
  el.innerHTML = '<p class="muted">Loading…</p>';
  const [players, stories] = await Promise.all([ api('/players'), api('/typing-stories') ]);

  const storyCard = `<div class="card">
    <h3>Story library</h3>
    <div class="muted">Stories students can type in Story Mode. Add your own; toggle which are active.</div>
    <div style="margin:10px 0">
      ${stories.map(s => `<div class="row" style="border-bottom:1px solid #28324f;padding:6px 0">
        <span class="pill ${s.active?'active':''}">${s.active?'on':'off'}</span>
        <b>${esc(s.title)}</b>
        <span class="muted">${s.author?esc(s.author)+' · ':''}gr ${s.grade_level} · ${s.length} chars ${s.builtin?'· built-in':''}</span>
        <span style="margin-left:auto" class="row">
          <button class="act ghost" onclick="toggleStory(${s.id},${s.active?0:1})">${s.active?'Deactivate':'Activate'}</button>
          ${s.builtin?'':`<button class="act danger" onclick="delStory(${s.id},'${esc(s.title)}')">Delete</button>`}
        </span></div>`).join('') || '<span class="muted">No stories.</span>'}
    </div>
    <details><summary>➕ Add a story</summary>
      <div style="margin-top:10px">
        <div class="row"><input id="stTitle" placeholder="Title" style="flex:1">
          <input id="stAuthor" placeholder="Author (optional)" style="flex:1">
          <select id="stGrade">${[1,2,3,4,5,6,7,8].map(g=>`<option value="${g}">Grade ${g}</option>`).join('')}</select></div>
        <textarea id="stBody" placeholder="Paste the story text here…" style="width:100%;height:120px;margin-top:8px;background:#0f1729;color:#e8edf7;border:1px solid #2a3557;border-radius:7px;padding:8px"></textarea>
        <button class="act" style="margin-top:8px" onclick="addStory()">Save story</button>
      </div>
    </details>
  </div>`;

  const studentCard = `<div class="card"><h3>Student progress</h3>` +
    (players.length ? players.map(p => `
      <details style="border-bottom:1px solid #28324f;padding:6px 0" data-pid="${p.id}" ontoggle="if(this.open)loadTypingDetail(${p.id},this)">
        <summary><b>${esc(p.username)}</b> <span class="muted">#${p.id}</span></summary>
        <div class="tdetail muted" style="margin:8px 0 4px">Loading…</div>
      </details>`).join('') : '<span class="muted">No players.</span>') + `</div>`;

  el.innerHTML = storyCard + studentCard;
}
async function loadTypingDetail(pid, node) {
  const box = node.querySelector('.tdetail');
  const d = await api(`/players/${pid}/typing`);
  const keys = (d.keyStats||[]).map(k => {
    const tot = k.correct + k.incorrect;
    return { key: k.key_char, acc: tot ? k.correct/tot : 1, avg: k.correct ? k.total_time_ms/k.correct : 0, tot };
  }).filter(k => k.tot >= 3);
  const worst = [...keys].sort((a,b)=>a.acc-b.acc).slice(0,6).filter(k=>k.acc<1);
  const slow  = [...keys].sort((a,b)=>b.avg-a.avg).slice(0,6);
  const laps  = (d.recentLaps||[]).slice(0,5);
  box.classList.remove('muted');
  box.innerHTML = `
    <div>Level reached: <b>${d.progress.level}</b></div>
    <div style="margin-top:6px">Least accurate keys: ${worst.length ? worst.map(k=>`<span class="chip">${disp(k.key)} ${Math.round(k.acc*100)}%</span>`).join(' ') : '<span class="muted">none — all accurate 👍</span>'}</div>
    <div style="margin-top:6px">Slowest keys: ${slow.length ? slow.map(k=>`<span class="chip">${disp(k.key)} ${Math.round(k.avg)}ms</span>`).join(' ') : '<span class="muted">no data yet</span>'}</div>
    <div style="margin-top:6px" class="muted">Recent laps: ${laps.length ? laps.map(l=>`L${l.level} ${(l.lap_ms/1000).toFixed(1)}s/${Math.round(l.wpm||0)}wpm/${Math.round((l.accuracy||0)*100)}%`).join(' · ') : 'none'}</div>`;
}
function disp(c){ return c === ' ' ? '␣' : esc(c); }
async function addStory() {
  const title = document.getElementById('stTitle').value.trim();
  const author = document.getElementById('stAuthor').value.trim();
  const grade_level = Number(document.getElementById('stGrade').value);
  const body = document.getElementById('stBody').value.trim();
  if (!title || !body) { alert('Title and text are required'); return; }
  await api('/typing-stories', { method:'POST', body: JSON.stringify({ title, author, grade_level, body }) });
  toast('Story added'); loadTyping();
}
async function toggleStory(id, active) { await api(`/typing-stories/${id}/activate`, { method:'POST', body: JSON.stringify({ active: !!active }) }); loadTyping(); }
async function delStory(id, title) { if (!confirm(`Delete story "${title}"?`)) return; await api(`/typing-stories/${id}`, { method:'DELETE' }); loadTyping(); }

// ─── Players ───────────────────────────────────────────────────────────────
async function loadPlayers() {
  const el = document.getElementById('panel-players');
  el.innerHTML = '<p class="muted">Loading…</p>';
  const players = await api('/players');
  if (!players.length) { el.innerHTML = '<p class="muted">No players yet.</p>'; return; }
  el.innerHTML = players.map(p => {
    const ps = p.math.playerStats || {};
    const opRows = (p.math.operationStats||[]).map(o =>
      `${OP_SYM[o.operation]||o.operation}: ${o.correct_eaten}✓/${o.incorrect_eaten}✗`).join(' &nbsp; ') || '<span class="muted">no math yet</span>';
    const mastered = (p.spellingMastery||[]).filter(m => m.mastered).length;
    const seen = (p.spellingMastery||[]).length;
    return `<div class="card">
      <div class="row">
        <h3 style="margin:0">${esc(p.username)}</h3>
        <span class="muted">#${p.id}</span>
        <div style="margin-left:auto" class="row">
          <button class="act ghost" onclick="resetPw(${p.id},'${esc(p.username)}')">Reset password</button>
          <button class="act danger" onclick="delPlayer(${p.id},'${esc(p.username)}')">Delete</button>
        </div>
      </div>
      <div class="muted" style="margin:8px 0">🐊 Math — best ${ps.best_score||0}, games ${ps.total_games||0} &nbsp;|&nbsp; ${opRows}</div>
      <div class="muted">🔤 Spelling — mastered ${mastered} of ${seen} seen</div>
      <details style="margin-top:8px"><summary>Set math focus facts</summary>
        <div id="focus-${p.id}" style="margin-top:10px">${focusEditor(p.id, p.focus||[])}</div>
        <button class="act" style="margin-top:10px" onclick="saveFocus(${p.id})">Save focus</button>
      </details>
    </div>`;
  }).join('');
}
function focusEditor(pid, focus) {
  const set = new Set(focus.map(f => f.operation + ':' + f.operand));
  return OPS.map(op => `<div class="row" style="margin-bottom:6px">
    <span style="width:130px">${op}</span>
    ${Array.from({length:13},(_,n)=>`<span class="chip ${set.has(op+':'+n)?'on':''}" data-op="${op}" data-n="${n}"
       onclick="this.classList.toggle('on')">${n}</span>`).join('')}
  </div>`).join('');
}
async function saveFocus(pid) {
  const chips = [...document.querySelectorAll(`#focus-${pid} .chip.on`)];
  const facts = chips.map(c => ({ operation: c.dataset.op, operand: Number(c.dataset.n) }));
  await api(`/players/${pid}/focus`, { method: 'POST', body: JSON.stringify({ facts }) });
  toast('Focus saved');
}
async function resetPw(id, name) {
  const np = prompt(`New password for ${name} (min 4 chars):`);
  if (!np) return;
  try { await api(`/players/${id}/reset-password`, { method:'POST', body: JSON.stringify({ newPassword: np }) }); toast('Password reset'); }
  catch (e) { alert('Failed: ' + e.message); }
}
async function delPlayer(id, name) {
  if (!confirm(`Delete ${name} and all their progress? This cannot be undone.`)) return;
  await api(`/players/${id}`, { method: 'DELETE' });
  loadPlayers();
}

// ─── Word lists ──────────────────────────────────────────────────────────────
async function loadWords() {
  const el = document.getElementById('panel-words');
  el.innerHTML = '<p class="muted">Loading…</p>';
  const lists = await api('/word-lists');
  el.innerHTML = `<div class="card"><div class="row">
      <input id="nlName" placeholder="New list name">
      <select id="nlGrade">${[1,2,3,4,5,6,7].map(g=>`<option value="${g}">Grade ${g}</option>`).join('')}</select>
      <button class="act" onclick="createList()">Add list</button>
    </div></div>` +
    lists.map(l => `<div class="card">
      <div class="row">
        <h3 style="margin:0">${esc(l.name)}</h3>
        <span class="pill ${l.active?'active':''}">${l.active?'active':'inactive'}</span>
        <div style="margin-left:auto" class="row">
          <button class="act ghost" onclick="toggleList(${l.id}, ${l.active?0:1})">${l.active?'Deactivate':'Activate'}</button>
          <button class="act danger" onclick="delList(${l.id},'${esc(l.name)}')">Delete</button>
        </div>
      </div>
      <div class="row" style="margin:10px 0; gap:6px">
        ${(l.words||[]).map(w=>`<span class="chip" title="grade ${w.grade_level}">${esc(w.word)}
          <b style="color:#ff9db0;margin-left:4px;cursor:pointer" onclick="delWord(${l.id},${w.id})">×</b></span>`).join('') || '<span class="muted">no words</span>'}
      </div>
      <div class="row">
        <input id="aw-${l.id}" placeholder="add word" onkeydown="if(event.key==='Enter')addWord(${l.id},${l.grade_level})">
        <button class="act ghost" onclick="addWord(${l.id},${l.grade_level})">Add word</button>
      </div>
    </div>`).join('');
}
async function createList() {
  const name = document.getElementById('nlName').value.trim();
  const grade_level = Number(document.getElementById('nlGrade').value);
  if (!name) return;
  await api('/word-lists', { method:'POST', body: JSON.stringify({ name, grade_level }) });
  loadWords();
}
async function toggleList(id, active) { await api(`/word-lists/${id}/activate`, { method:'POST', body: JSON.stringify({ active: !!active }) }); loadWords(); }
async function delList(id, name) { if (!confirm(`Delete list "${name}"?`)) return; await api(`/word-lists/${id}`, { method:'DELETE' }); loadWords(); }
async function addWord(listId, grade) {
  const inp = document.getElementById('aw-' + listId);
  const word = inp.value.trim(); if (!word) return;
  await api(`/word-lists/${listId}/words`, { method:'POST', body: JSON.stringify({ word, grade_level: grade }) });
  loadWords();
}
async function delWord(listId, wordId) { await api(`/word-lists/${listId}/words/${wordId}`, { method:'DELETE' }); loadWords(); }

// ─── Sessions ────────────────────────────────────────────────────────────────
async function loadSessions() {
  const el = document.getElementById('panel-sessions');
  const s = await api('/sessions');
  if (!s.length) { el.innerHTML = '<p class="muted">No spelling sessions recorded yet.</p>'; return; }
  el.innerHTML = `<div class="card"><table><tr><th>#</th><th>Started</th><th>Ended</th><th>Team score</th></tr>` +
    s.map(r=>`<tr><td>${r.id}</td><td>${fmt(r.started_at)}</td><td>${r.ended_at?fmt(r.ended_at):'—'}</td><td>${r.team_score}</td></tr>`).join('') +
    `</table></div>`;
}

// ─── Live ────────────────────────────────────────────────────────────────────
let liveTimer = null;
async function loadLive() {
  if (liveTimer) clearInterval(liveTimer);
  const render = async () => {
    const el = document.getElementById('panel-live');
    if (!document.getElementById('panel-live').classList.contains('active')) { clearInterval(liveTimer); return; }
    const live = await api('/live');
    const names = { math:'🐊 Math Gator', spelling:'👾 Spelling Invaders', sniper:'🎯 Spelling Sniper', typing:'🚂 Typing Train', skate:"🛼 Skate 'n' Add", read:'🚀 Rocket Read' };
    el.innerHTML = Object.entries(live).map(([k,v]) => {
      if (!v) return '';
      const players = (v.players||[]).map(p=>`${esc(p.username)} (${p.score??''}${p.lives!=null?'♥'+p.lives:''})`).join(', ') || '<span class="muted">nobody playing</span>';
      return `<div class="card"><h3>${names[k]||k}</h3>
        <div class="muted">phase: ${v.phase||'—'} ${v.teamScore!=null?'· team '+v.teamScore:''} ${v.wordCount!=null?'· words '+v.wordCount:''} ${v.appleCount!=null?'· apples '+v.appleCount:''}</div>
        <div style="margin-top:6px">${players}</div></div>`;
    }).join('');
  };
  await render();
  liveTimer = setInterval(render, 2000);
}

// ─── utils ───────────────────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmt(ts){ return new Date(ts*1000).toLocaleString(); }
function toast(msg){ const d=document.createElement('div'); d.textContent=msg;
  d.style.cssText='position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#2e7d5b;color:#fff;padding:10px 18px;border-radius:8px;z-index:9';
  document.body.appendChild(d); setTimeout(()=>d.remove(),1600); }

// auto-login if password remembered this session
if (sessionStorage.getItem('tpw')) { document.getElementById('pw').value = sessionStorage.getItem('tpw'); doLogin(); }
</script>
