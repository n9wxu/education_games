<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Captain</title>
<style>
  *{box-sizing:border-box} html,body{margin:0;height:100%;font-family:system-ui,sans-serif;background:#02030a;color:#dfe7ff;overflow:hidden}
  #wrap{max-width:960px;margin:0 auto;padding:8px}
  header{display:flex;align-items:center;gap:12px} header h1{font-size:1.2rem;margin:0} header a{margin-left:auto;color:#9fb4ff;text-decoration:none;font-weight:700}
  #task{text-align:center;font-size:1.15rem;min-height:1.5em;color:#ffe08a} #task b{color:#fff}
  #main{display:flex;gap:8px}
  canvas{flex:1;background:radial-gradient(ellipse at 50% 20%,#0a1230,#02030a);border-radius:12px;cursor:pointer;touch-action:none}
  #side{width:160px}
  #board{background:#0a1024;border:1px solid #22305a;border-radius:12px;padding:8px;font-size:.85rem}
  #board h4{margin:2px 0 6px} #board .row{display:flex;justify-content:space-between} #board .me{color:#ffd23f}
  #options{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:8px;min-height:44px}
  #options button{border:none;border-radius:10px;background:#22305a;color:#fff;padding:9px 14px;font-size:1rem;cursor:pointer}
  #fb{text-align:center;min-height:1.3em;font-weight:700}
  .overlay{position:fixed;inset:0;background:rgba(2,3,12,.94);display:flex;align-items:center;justify-content:center;padding:16px;z-index:20}
  .panel{background:#0a1024;border:1px solid #22305a;border-radius:18px;padding:24px;width:min(400px,94vw);text-align:center}
  .panel input{width:100%;padding:12px;margin:7px 0;border-radius:10px;border:1px solid #22305a;background:#02030a;color:#fff}
  .btn{background:#4f7cff;color:#fff;border:none;border-radius:10px;padding:11px 16px;font-weight:700;cursor:pointer} .btn.sec{background:#22305a} .err{color:#ff8095;min-height:1em}
</style></head><body>
<div id="wrap">
  <header><h1>⭐ Star Captain</h1><span id="who"></span><a href="/">← Games</a></header>
  <div id="task">Reading the night sky…</div>
  <div id="main">
    <canvas id="c" width="720" height="440"></canvas>
    <div id="side"><div id="board"><h4>🏁 Race</h4><div id="rows"></div></div></div>
  </div>
  <div id="options"></div>
  <div id="fb"></div>
</div>
<div class="overlay" id="loginOv"><div class="panel"><h2>⭐ Star Captain</h2><p>Log in and learn to read the night sky.</p>
  <input id="u" placeholder="Your name"><input id="p" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')G.login()">
  <div style="display:flex;gap:8px;justify-content:center;margin-top:8px"><button class="btn" onclick="G.login()">Set sail</button><button class="btn sec" onclick="G.register()">New account</button></div>
  <div class="err" id="loginErr"></div></div></div>
<script src="/star/socket.io/socket.io.js"></script><script src="game.js"></script>
</body></html>
