<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tank Squad Math Blast</title>
<style>
  *{box-sizing:border-box} html,body{margin:0;height:100%;font-family:system-ui,sans-serif;background:#2e2a1e;color:#fff;overflow:hidden}
  #wrap{max-width:940px;margin:0 auto;padding:8px}
  header{display:flex;align-items:center;gap:12px} header h1{font-size:1.2rem;margin:0} header a{margin-left:auto;color:#ffe08a;text-decoration:none;font-weight:700}
  #hud{padding:4px 6px} #hud b{color:#ffd23f} #hud .team{color:#7be06a}
  #prob{text-align:center;font-size:2rem;font-weight:800;margin:2px;color:#ffd23f}
  canvas{display:block;width:100%;background:#5a7a3a;border-radius:12px;cursor:crosshair}
  .overlay{position:fixed;inset:0;background:rgba(20,18,10,.92);display:flex;align-items:center;justify-content:center;padding:16px;z-index:20}
  .panel{background:#3a3420;border-radius:18px;padding:24px;width:min(380px,94vw);text-align:center}
  .panel input{width:100%;padding:12px;margin:7px 0;border-radius:10px;border:1px solid #6a5f38;background:#2e2a1e;color:#fff}
  .btn{background:#c0862a;color:#fff;border:none;border-radius:10px;padding:11px 16px;font-weight:700;cursor:pointer} .btn.sec{background:#5a5030} .err{color:#ff8095;min-height:1em}
</style></head><body>
<div id="wrap">
  <header><h1>💥 Tank Squad Math Blast</h1><span id="who"></span><a href="/">← Games</a></header>
  <div id="hud">Score <b id="score">0</b> · Streak <b id="streak">0</b> · <span class="team">Team <b class="team" id="team">0</b></span></div>
  <div id="prob">…</div>
  <canvas id="c" width="900" height="420"></canvas>
</div>
<div class="overlay" id="loginOv"><div class="panel"><h2>💥 Tank Squad</h2><p>Log in, join the squad, blast the right answers!</p>
  <input id="u" placeholder="Your name"><input id="p" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')G.login()">
  <div style="display:flex;gap:8px;justify-content:center;margin-top:8px"><button class="btn" onclick="G.login()">Play!</button><button class="btn sec" onclick="G.register()">New account</button></div>
  <div class="err" id="loginErr"></div></div></div>
<script src="/tank/socket.io/socket.io.js"></script><script src="game.js"></script>
</body></html>
