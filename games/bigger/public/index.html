<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hungry Number Alligator</title>
<style>
  *{box-sizing:border-box} html,body{margin:0;height:100%;font-family:system-ui,sans-serif;background:linear-gradient(#7ed957,#2ba84a);color:#083; overflow:hidden}
  #wrap{max-width:820px;margin:0 auto;padding:8px;height:100dvh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:12px;color:#054} header h1{font-size:1.2rem;margin:0} header a{margin-left:auto;color:#054;text-decoration:none;font-weight:700}
  #hud{color:#054;font-weight:700;padding:2px 6px} #hud b{color:#c0392b}
  #play{flex:1;display:flex;align-items:center;justify-content:center;gap:min(6vw,50px)}
  .num{width:min(34vw,220px);height:min(34vw,220px);border-radius:28px;border:6px solid #fff;background:#fffbe6;color:#0a5;
       font-size:min(18vw,120px);font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 0 #0a5a2f}
  .num:active{transform:translateY(4px);box-shadow:0 4px 0 #0a5a2f}
  .gator{font-size:min(20vw,130px);filter:drop-shadow(0 6px 6px rgba(0,0,0,.25))}
  .gator.chomp{animation:chomp .4s}
  @keyframes chomp{0%,100%{transform:scale(1)}40%{transform:scale(1.35) rotate(-8deg)}}
  #fb{text-align:center;font-size:1.4rem;font-weight:800;min-height:1.6em;color:#054}
  .wrong{animation:shake .4s} @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .overlay{position:fixed;inset:0;background:rgba(4,60,30,.9);display:flex;align-items:center;justify-content:center;padding:16px;z-index:20}
  .panel{background:#fff;border-radius:22px;padding:26px;width:min(380px,94vw);text-align:center;color:#083}
  .panel input{width:100%;padding:12px;margin:7px 0;border-radius:12px;border:2px solid #cfead6;font-size:1.05rem}
  .btn{background:#2ba84a;color:#fff;border:none;border-radius:12px;padding:12px 18px;font-size:1.05rem;font-weight:700;cursor:pointer}
  .btn.sec{background:#dff3e4;color:#2ba84a} .err{color:#c0392b;min-height:1em}
</style>
</head>
<body>
<div id="wrap">
  <header><h1>🐊 Hungry Number Alligator</h1><span id="who"></span><a href="/">← Games</a></header>
  <div id="hud">Chomps <b id="score">0</b> · Streak <b id="streak">0</b></div>
  <div id="play">
    <button class="num" id="left" onclick="G.pick('left')">?</button>
    <div class="gator" id="gator">🐊</div>
    <button class="num" id="right" onclick="G.pick('right')">?</button>
  </div>
  <div id="fb">Tap the BIGGER number!</div>
</div>
<div class="overlay" id="loginOv"><div class="panel">
  <h2>🐊 Hungry Alligator</h2><p>Log in and feed the hungry gator!</p>
  <input id="u" placeholder="Your name"><input id="p" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')G.login()">
  <div style="display:flex;gap:8px;justify-content:center;margin-top:8px"><button class="btn" onclick="G.login()">Play!</button><button class="btn sec" onclick="G.register()">New account</button></div>
  <div class="err" id="loginErr"></div>
</div></div>
<script src="/bigger/socket.io/socket.io.js"></script>
<script src="game.js"></script>
</body></html>
