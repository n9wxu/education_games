<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rockite Tank Blaster</title>
<style>
  *{box-sizing:border-box} html,body{margin:0;height:100%;font-family:system-ui,sans-serif;background:#20301a;color:#fff;overflow:hidden}
  #wrap{max-width:940px;margin:0 auto;padding:8px}
  header{display:flex;align-items:center;gap:12px} header h1{font-size:1.2rem;margin:0} header a{margin-left:auto;color:#bfe08a;text-decoration:none;font-weight:700}
  #hud{padding:4px 6px} #hud b{color:#ffd23f}
  #call{text-align:center;font-size:1.8rem;font-weight:800;color:#ffd23f;min-height:1.4em}
  canvas{display:block;width:100%;background:#3a5a2a;border-radius:12px;cursor:crosshair}
  #cheers{display:flex;gap:8px;justify-content:center;padding:8px;flex-wrap:wrap}
  #cheers button{border:none;border-radius:999px;background:#4a6a2a;color:#fff;padding:8px 14px;font-size:1rem;cursor:pointer}
  #peerCheer{text-align:center;min-height:1.2em;color:#bfe08a}
  .overlay{position:fixed;inset:0;background:rgba(15,24,10,.93);display:flex;align-items:center;justify-content:center;padding:16px;z-index:20}
  .panel{background:#2a3a1e;border-radius:18px;padding:24px;width:min(380px,94vw);text-align:center}
  .panel input{width:100%;padding:12px;margin:7px 0;border-radius:10px;border:1px solid #5a7a3a;background:#20301a;color:#fff}
  .btn{background:#6a9a3a;color:#fff;border:none;border-radius:10px;padding:11px 16px;font-weight:700;cursor:pointer} .btn.sec{background:#4a5a30} .err{color:#ff8095;min-height:1em}
</style></head><body>
<div id="wrap">
  <header><h1>🟩 Rockite Tank Blaster</h1><span id="who"></span><a href="/">← Games</a></header>
  <div id="hud">Score <b id="score">0</b> · Streak <b id="streak">0</b></div>
  <div id="call">Get ready…</div>
  <canvas id="c" width="900" height="400"></canvas>
  <div id="cheers"></div>
  <div id="peerCheer"></div>
</div>
<div class="overlay" id="loginOv"><div class="panel"><h2>🟩 Rockite Tank Blaster</h2><p>Log in and blast the right number tanks!</p>
  <input id="u" placeholder="Your name"><input id="p" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')G.login()">
  <div style="display:flex;gap:8px;justify-content:center;margin-top:8px"><button class="btn" onclick="G.login()">Play!</button><button class="btn sec" onclick="G.register()">New account</button></div>
  <div class="err" id="loginErr"></div></div></div>
<script src="/rockite/socket.io/socket.io.js"></script><script src="game.js"></script>
</body></html>
